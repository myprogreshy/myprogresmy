<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kirim Masukan</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<!-- EMAILJS -->
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<script>
(function(){
  emailjs.init("5A_j5oQ7f8c2NtuP7");
})();
</script>

<style>
:root{
  --primary:#2c7be5;
  --bg:#f6f8fb;
  --card:#ffffff;
  --text:#1f2937;
  --muted:#6b7280;
}

body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:var(--bg);
}

.container{
  max-width:500px;
  margin:50px auto;
  padding:20px;
}

.card{
  background:#fff;
  padding:20px;
  border-radius:10px;
  border:1px solid #e5e7eb;
}

h2{
  margin-bottom:10px;
}

input, textarea{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:1px solid #ddd;
  border-radius:8px;
}

textarea{
  min-height:120px;
}

button{
  margin-top:15px;
  width:100%;
  padding:12px;
  background:#2c7be5;
  color:#fff;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.loading{
  display:none;
  margin-top:10px;
  font-size:13px;
}

.success{
  display:none;
  margin-top:10px;
  color:green;
}
</style>
</head>

<body>

<div class="container">
  <div class="card">
    <h2>💬 Kirim Masukan</h2>

    <input type="text" id="nama" placeholder="Nama (opsional)">
    <textarea id="pesan" placeholder="Tulis masukan..."></textarea>

    <button onclick="kirim()">Kirim</button>

    <div class="loading" id="loading">⏳ Mengirim...</div>
    <div class="success" id="success">✅ Berhasil dikirim!</div>
  </div>
</div>

<script>
function kirim(){
  const nama = document.getElementById("nama").value;
  const pesan = document.getElementById("pesan").value;

  if(pesan.trim() === ""){
    alert("Pesan tidak boleh kosong!");
    return;
  }

  document.getElementById("loading").style.display = "block";

  emailjs.send("service_sskzgxn","template_y4o0v0a",{
    nama: nama || "Anonim",
    pesan: pesan
  })
  .then(function(){
    document.getElementById("loading").style.display = "none";
    document.getElementById("success").style.display = "block";

    document.getElementById("nama").value = "";
    document.getElementById("pesan").value = "";
  })
  .catch(function(error){
    document.getElementById("loading").style.display = "none";
    alert("❌ Error: " + JSON.stringify(error));
    console.log(error);
  });
}
</script>

</body>
</html>
