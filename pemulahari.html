<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Japanese Sentence Flashcard ULTRA</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

html,body{
height:100%;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,sans-serif;
background:#e6f9e6;
}

body{
display:flex;
justify-content:center;
align-items:center;
}

.app{
width:100%;
max-width:420px;
height:100%;
background:#ffffff;
display:flex;
flex-direction:column;
padding:14px;
}

/* TOP BAR */
.top-bar{
display:flex;
align-items:center;
justify-content: space-between;
gap:10px;
margin-bottom: 6px;
}

.title-badge{
background:#58cc02;
color:white;
padding:6px 14px;
border-radius:14px;
font-weight:800;
font-size:0.9rem;
}

.card-counter{
padding:6px 12px;
border-radius:14px;
background:#f1fdf0;
border:2px solid #58cc02;
font-weight:800;
font-size:0.9rem;
color: #333;
}

/* FLASHCARD 3D EFFECT */
.card-container {
flex: 1;
perspective: 1000px;
margin: 15px 0;
cursor: pointer;
}

.flashcard {
width: 100%;
height: 100%;
position: relative;
transform-style: preserve-3d;
transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
box-shadow: 0 10px 25px rgba(0,0,0,.08);
border-radius: 26px;
}

/* Ketika kartu di-flip */
.flashcard.flipped {
transform: rotateY(180deg);
}

.card-face {
position: absolute;
width: 100%;
height: 100%;
backface-visibility: hidden;
border-radius: 26px;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
padding: 24px;
border: 2px solid #e2e8f0;
}

/* Sisi Depan (Bahasa Jepang) */
.card-front {
background: #f8fff6;
border-color: #c2f0c2;
}

/* Sisi Belakang (Arti Indonesia) */
.card-back {
background: #ffffff;
border-color: #58cc02;
transform: rotateY(180deg);
}

.hint-text {
font-size: 0.8rem;
color: #888;
font-weight: 700;
text-transform: uppercase;
letter-spacing: 1px;
margin-bottom: 20px;
position: absolute;
top: 20px;
}

/* BADGE BAB DI DALAM KARTU DEPAN */
.bab-badge-card {
background: #dff5d8;
color: #3b8701;
padding: 4px 12px;
border-radius: 10px;
font-size: 0.85rem;
font-weight: 800;
margin-bottom: 16px;
border: 1px solid #bce6b3;
}

.card-content {
font-size: 1.6rem;
font-weight: 900;
color: #000;
text-align: center;
line-height: 1.8;
word-break: break-word;
}

.card-back .card-content {
font-size: 1.25rem;
color: #2e7d32;
line-height: 1.5;
}

/* KETERANGAN TAMBAHAN DI KARTU BELAKANG */
.extra-info {
margin-top: 16px;
background: #f1fdf0;
border-left: 4px solid #58cc02;
padding: 8px 12px;
border-radius: 4px;
font-size: 0.85rem;
color: #555;
font-weight: 600;
max-width: 90%;
text-align: left;
line-height: 1.4;
}

/* NAVIGASI TOMBOL */
.nav-controls {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 14px;
margin-top: 10px;
}

.nav-controls button {
padding: 16px;
font-size: 1.1rem;
border: none;
border-radius: 18px;
color: white;
font-weight: 800;
cursor: pointer;
transition: .15s;
display: flex;
align-items: center;
justify-content: center;
gap: 8px;
}

#prevBtn {
background: #888888;
}

#prevBtn:hover:not([disabled]) {
background: #666666;
transform: scale(1.02);
}

#nextBtn {
background: #58cc02;
}

#nextBtn:hover:not([disabled]) {
background: #46b400;
transform: scale(1.02);
}

/* Style ketika tombol dinonaktifkan (di ujung data) */
button:disabled {
opacity: 0.4;
cursor: not-allowed;
transform: none !important;
}

</style>
</head>

<body>

<div class="title-badge">Flashcard Contoh Kalimat</div>
<div class="card-counter" id="cardCounter">1 / 10</div>
</div>

<div class="card-container" onclick="flipCard()">
<div class="flashcard" id="flashcard">
<div class="card-face card-front">
<div class="hint-text">🇯🇵 Bahasa Jepang (Klik untuk arti)</div>
<div class="bab-badge-card" id="babText">Bab --</div>
<div class="card-content" id="qText">?</div>
</div>
<div class="card-face card-back">
<div class="hint-text">🇮🇩 Arti Indonesia</div>
<div class="card-content" id="aText">?</div>
<div class="extra-info" id="extraText">?</div>
</div>
</div>
</div>

<div class="nav-controls">
<button id="prevBtn" onclick="prevCard()">Kembali</button>
<button id="nextBtn" onclick="nextCard()">Lanjut</button>
</div>

</div>

let index = 0;

function updateCard() {
  const cardElement = document.getElementById("flashcard");
  
  // Kembalikan posisi kartu ke sisi depan setiap berganti soal
  cardElement.classList.remove("flipped");

  // Beri jeda sedikit agar perubahan teks terjadi saat kartu menghadap ke depan
  setTimeout(() => {
    const currentData = sentenceData[index];

    // Isi Konten Sisi Depan
    document.getElementById("babText").textContent = currentData[2];
    document.getElementById("qText").innerHTML = currentData[0];

    // Isi Konten Sisi Belakang
    document.getElementById("aText").innerHTML = currentData[1];
    
    // Validasi Keterangan Tambahan
    const extraElement = document.getElementById("extraText");
    if (currentData[3] && currentData[3].trim() !== "") {
      extraElement.style.display = "block";
      extraElement.innerHTML = currentData[3];
    } else {
      extraElement.style.display = "none";
    }

    // Nomor urut kartu
    document.getElementById("cardCounter").textContent = (index + 1) + " / " + sentenceData.length;

    // Atur kondisi tombol aktif/nonaktif di ujung kartu
    document.getElementById("prevBtn").disabled = (index === 0);
    document.getElementById("nextBtn").disabled = (index === sentenceData.length - 1);
  }, 150);
}

// Fungsi membalikkan kartu
function flipCard() {
  document.getElementById("flashcard").classList.toggle("flipped");
}

// Fungsi navigasi ke kartu berikutnya
function nextCard() {
  if (index < sentenceData.length - 1) {
    index++;
    updateCard();
  }
}

// Fungsi navigasi ke kartu sebelumnya
function prevCard() {
  if (index > 0) {
    index--;
    updateCard();
  }
}

// Menjalankan inisialisasi awal saat halaman dimuat
updateCard();

</script>

</body>
</html>
