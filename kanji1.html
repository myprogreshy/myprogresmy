<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Japanese Vocab Game ULTRA</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

html,body{
height:100%;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,sans-serif;
background:#e6f9e6;
}

body{
display:flex;
justify-content:center;
align-items:center;
}

.app{
width:100%;
max-width:420px;
height:100%;
background:#ffffff;
display:flex;
flex-direction:column;
padding:14px;
}

.top-bar{
display:flex;
align-items:center;
gap:10px;
}

.level{
background:#58cc02;
color:white;
padding:6px 12px;
border-radius:14px;
font-weight:800;
}

.xp-bar{
flex:1;
height:12px;
background:#dff5d8;
border-radius:20px;
overflow:hidden;
}

#progressBar{
height:100%;
width:0%;
background:linear-gradient(90deg,#58cc02,#89e219);
transition:.4s;
}

.score,.streak{
padding:6px 10px;
border-radius:14px;
background:#f1fdf0;
border:2px solid #58cc02;
font-weight:700;
}

.info-table{
width:100%;
margin-top:6px;
border-collapse:collapse;
background:#f1fdf0;
border:2px solid #58cc02;
border-radius:12px;
overflow:hidden;
font-weight:800;
font-size:0.9rem;
}

.info-table td{
padding:6px 10px;
}

.quiz-name{
color:#58cc02;
text-align:left;
}

.q-number{
text-align:right;
color:#333;
}

.card{
flex:1;
background:#f8fff6;
border-radius:26px;
margin:20px 0;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
box-shadow:0 10px 25px rgba(0,0,0,.08);
overflow:hidden;
}

#question{
font-size:3rem;
font-weight:900;
}

#meaning{
font-size:1rem;
color:#666;
margin-top:8px;
}

#options{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

#options button{
padding:16px;
font-size:1.3rem;
border:none;
border-radius:18px;
background:#58cc02;
color:white;
font-weight:800;
cursor:pointer;
}

#result{
text-align:center;
margin-top:8px;
font-weight:800;
}

.badge{
text-align:center;
margin-top:4px;
font-weight:900;
color:#ff9600;
}

.restart{
padding:14px;
border:none;
border-radius:16px;
font-weight:800;
background:#ff9600;
color:white;
}

</style>
</head>

<body>

<div class="app">

<div class="top-bar">
<div class="level">XP</div>
<div class="xp-bar"><div id="progressBar"></div></div>
<div class="score" id="score">0 XP</div>
<div class="streak" id="streak">x 0</div>
</div>

<table class="info-table">
<tr>
<td class="quiz-name">Kanji Reading</td>
<td class="q-number" id="qNumber">1 / 12</td>
</tr>
</table>

<div class="card">
<div id="question">?</div>
<div id="meaning"></div>
</div>

<div id="options"></div>

<div id="result"></div>
<div class="badge" id="badge"></div>

<button class="restart" id="restartBtn" onclick="start()" style="display:none;">
Mulai Ulang
</button>

</div>

<script>

/* FORMAT: [KANJI, ARTI, BACAAN] */
const vocab=[
["山","gunung","やま"],
["川","sungai","かわ"],
["水","air","みず"],
["火","api","ひ"],
["木","pohon","き"],
["金","emas","かね"],
["土","tanah","つち"],
["日","hari","ひ"],
["月","bulan","つき"],
["人","orang","ひと"],
["女","wanita","おんな"],
["男","laki-laki","おとこ"]
];

let q=[],cur=0,xp=0,streak=0;
let perfectCorrect=0;
let wrongList=[];
let firstWrong=null;

function shuffle(a){
for(let i=a.length-1;i>0;i--){
const j=Math.floor(Math.random()*(i+1));
[a[i],a[j]]=[a[j],a[i]];
}
}

function updateUI(){
document.getElementById("score").textContent=xp+" XP";
document.getElementById("streak").textContent="x "+streak;

const progress=(perfectCorrect/q.length)*100;
document.getElementById("progressBar").style.width=progress+"%";

document.getElementById("qNumber").textContent=(cur+1)+" / "+q.length;
}

function loadQuestion(){

if(cur>=q.length){finish();return;}

firstWrong=null;

const [kanji,arti,baca]=q[cur];

document.getElementById("question").textContent=kanji;
document.getElementById("meaning").textContent=arti;

const ops=new Set([baca]);

while(ops.size<4){
ops.add(vocab[Math.floor(Math.random()*vocab.length)][2]);
}

document.getElementById("options").innerHTML="";

[...ops].sort(()=>Math.random()-0.5).forEach(o=>{
const b=document.createElement("button");
b.textContent=o;
b.onclick=()=>check(o,baca,kanji);
document.getElementById("options").appendChild(b);
});

updateUI();
}

function check(sel,ans,kanji){

if(sel===ans){

if(!firstWrong){
perfectCorrect++;
}

streak++;
xp+=2;

if(firstWrong){
wrongList.push({
q:kanji,
your:firstWrong,
correct:ans
});
}

cur++;
setTimeout(loadQuestion,400);

}else{

if(!firstWrong){
firstWrong=sel;
}

streak=0;

}

updateUI();
}

function finish(){

document.getElementById("options").innerHTML="";

document.querySelector(".card").innerHTML=`
<div style="text-align:center">
<h2>Quiz Selesai 🎉</h2>
<p>Progres kamu:</p>
</div>
`;

document.getElementById("progressBar").style.width="100%";
document.getElementById("restartBtn").style.display="block";
}

function start(){

q=[...vocab];
shuffle(q);

cur=0;
xp=0;
streak=0;
perfectCorrect=0;
wrongList=[];

document.querySelector(".card").innerHTML=`
<div id="question">?</div>
<div id="meaning"></div>
`;

document.getElementById("restartBtn").style.display="none";

loadQuestion();
}

start();

</script>

</body>
</html>
