<!DOCTYPE html>

<title>Japanese Vocab Game ULTRA</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

html,body{
height:100%;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,sans-serif;
background:#e6f9e6;
}

body{
display:flex;
justify-content:center;
align-items:center;
}

.app{
width:100%;
max-width:420px;
height:100%;
background:#ffffff;
display:flex;
flex-direction:column;
padding:14px;
}

.top-bar{
display:flex;
align-items:center;
gap:10px;
}

.level{
background:#58cc02;
color:white;
padding:6px 12px;
border-radius:14px;
font-weight:800;
}

.xp-bar{
flex:1;
height:12px;
background:#dff5d8;
border-radius:20px;
overflow:hidden;
}

#progressBar{
height:100%;
width:0%;
background:linear-gradient(90deg,#58cc02,#89e219);
transition:.4s;
}

.score,.streak{
padding:6px 10px;
border-radius:14px;
background:#f1fdf0;
border:2px solid #58cc02;
font-weight:700;
}

.info-table{
width:100%;
margin-top:6px;
border-collapse:collapse;
background:#f1fdf0;
border:2px solid #58cc02;
border-radius:12px;
overflow:hidden;
font-weight:800;
font-size:0.9rem;
}

.info-table td{
padding:6px 10px;
}

.quiz-name{color:#58cc02;}
.q-number{text-align:right;color:#333;}

.card{
flex:1;
background:#f8fff6;
border-radius:26px;
margin:20px 0;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
box-shadow:0 10px 25px rgba(0,0,0,.08);
}

#question{
font-size:3rem;
font-weight:900;
}

#meaning{
font-size:1rem;
color:#666;
margin-top:8px;
}

#options{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

#options button{
padding:16px;
font-size:1.3rem;
border:none;
border-radius:18px;
background:#58cc02;
color:white;
font-weight:800;
cursor:pointer;
}

.correct{
background:#58cc02 !important;
}

#result{
text-align:center;
margin-top:8px;
font-weight:800;
min-height:28px;
color:#000;
}

.badge{
text-align:center;
margin-top:4px;
font-weight:900;
color:#ff9600;
}

.restart{
padding:14px;
border:none;
border-radius:16px;
font-weight:800;
background:#ff9600;
color:white;
}

</style>
</head>

<div id="options"></div>

let q=[],cur=0,xp=0,streak=0;
let perfectCorrect=0;
let wrongList=[];
let firstWrong=null;

/* TAMBAHAN */
let currentOptions=[];

function shuffle(a){
for(let i=a.length-1;i>0;i--){
const j=Math.floor(Math.random()*(i+1));
[a[i],a[j]]=[a[j],a[i]];
}
}

function updateUI(){
document.getElementById("score").textContent=xp+" XP";
document.getElementById("streak").textContent="x "+streak;
document.getElementById("qNumber").textContent=(cur+1)+" / "+q.length;

const progress=(perfectCorrect/q.length)*100;
document.getElementById("progressBar").style.width=progress+"%";
}

function loadQuestion(){

if(cur>=q.length){finish();return;}

firstWrong=null;

const [kanji,arti,baca]=q[cur];

document.getElementById("question").textContent=kanji;
document.getElementById("meaning").textContent=arti;
document.getElementById("result").textContent="";
document.getElementById("badge").textContent="";

const ops=new Set([baca]);

while(ops.size<4){
ops.add(vocab[Math.floor(Math.random()*vocab.length)][2]);
}

/* HANYA ACAK SEKALI */
if(currentOptions.length===0){
currentOptions=[...ops].sort(()=>Math.random()-0.5);
}

document.getElementById("options").innerHTML="";

currentOptions.forEach(o=>{
const b=document.createElement("button");
b.textContent=o;
b.onclick=()=>check(o,baca,kanji);
document.getElementById("options").appendChild(b);
});

updateUI();
}

function check(sel,ans,kanji){

const buttons=document.querySelectorAll("#options button");

buttons.forEach(btn=>{
btn.disabled=true;

if(btn.textContent===ans){
btn.classList.add("correct");
}
});

if(sel===ans){

let bonus=streak>=5?5:2;
xp+=bonus;
streak++;

document.getElementById("result").textContent="BENAR +"+bonus+" XP";

if(streak==5){
document.getElementById("badge").textContent="🏆 COMBO x5";
}

if(!firstWrong){
perfectCorrect++;
}

/* RESET OPSI UNTUK SOAL BARU */
currentOptions=[];

setTimeout(()=>{
cur++;
loadQuestion();
},700);

}else{

streak=0;

document.getElementById("result").textContent="SALAH";

if(!firstWrong){
firstWrong=sel;
}

setTimeout(()=>{
loadQuestion();
},700);
}

updateUI();
}

function finish(){

document.getElementById("options").innerHTML="";
document.querySelector(".card").innerHTML="<h2>Quiz Selesai 🎉</h2>";

document.getElementById("progressBar").style.width="100%";
document.getElementById("restartBtn").style.display="block";
}

function start(){

q=[...vocab];
shuffle(q);

cur=0;
xp=0;
streak=0;
perfectCorrect=0;
wrongList=[];
currentOptions=[];

document.querySelector(".card").innerHTML=`
<div id="question">?</div>
<div id="meaning"></div>
`;

document.getElementById("restartBtn").style.display="none";

loadQuestion();
}

start();
