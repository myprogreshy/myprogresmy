<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Japanese Builder ULTRA</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{ height:100%; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,sans-serif; background:#e6f9e6; }
body{ display:flex; justify-content:center; align-items:center; }

.app{
    width:100%; max-width:420px; height:100%; background:#ffffff;
    display:flex; flex-direction:column; padding:14px; position: relative;
}

/* ===== UI COMPONENTS ===== */
.top-bar{ display:flex; align-items:center; gap:10px; margin-bottom: 10px; }
.level{ background:#58cc02; color:white; padding:6px 12px; border-radius:14px; font-weight:800; }
.xp-bar{ flex:1; height:12px; background:#dff5d8; border-radius:20px; overflow:hidden; }
#progressBar{ height:100%; width:0%; background:linear-gradient(90deg,#58cc02,#89e219); transition:.4s; }
.score, .streak{ padding:6px 10px; border-radius:14px; background:#f1fdf0; border:2px solid #58cc02; font-weight:700; }

.info-table{ width:100%; margin-top:6px; border-collapse:collapse; background:#f1fdf0; border:2px solid #58cc02; border-radius:12px; overflow:hidden; font-weight:800; font-size:0.9rem; }
.info-table td{ padding:6px 10px; }
.quiz-name{ color:#58cc02; text-align:left; }
.q-number{ text-align:right; color:#333; }

/* ===== MENU & LIST ===== */
#menu h2 { margin: 10px 0; color: #333; }
.btn-create { width:100%; padding:15px; background:#58cc02; color:white; border:none; border-radius:16px; font-weight:800; cursor:pointer; margin-bottom:15px; }
.set-item { background:#fff; border:2px solid #e5e7eb; padding:12px; border-radius:16px; margin-bottom:10px; }
.set-info { font-weight:800; font-size:1.1rem; margin-bottom:8px; display:block; }
.set-actions { display:flex; gap:5px; }
.set-actions button { flex:1; padding:8px; border:none; border-radius:10px; color:white; font-weight:700; cursor:pointer; font-size:0.8rem; }
.btn-start { background:#58cc02; }
.btn-edit { background:#ff9600; }
.btn-delete { background:#ff4b4b; }

/* ===== BUILDER FORM ===== */
.builder-form { display:flex; flex-direction:column; gap:8px; margin-bottom:15px; }
.builder-form input { padding:12px; border-radius:12px; border:2px solid #e5e7eb; font-weight:600; }
.vocab-preview { max-height: 150px; overflow-y: auto; background: #f9f9f9; padding: 10px; border-radius: 12px; margin-bottom: 10px; }
.v-item { display:flex; justify-content:space-between; padding:5px 0; border-bottom:1px solid #ddd; font-size: 0.9rem; font-weight: 600; }

/* ===== QUIZ CARD ===== */
.card{ flex:1; background:#f8fff6; border-radius:26px; margin:20px 0; display:flex; align-items:center; justify-content:center; box-shadow:0 10px 25px rgba(0,0,0,.08); overflow:hidden; }
#question{ font-size:2.6rem; font-weight:900; text-align:center; padding: 20px; }
#options{ display:grid; grid-template-columns:1fr 1fr; gap:12px; }
#options button{ padding:16px; font-size:1.1rem; border:none; border-radius:18px; background:#58cc02; color:white; font-weight:800; cursor:pointer; }
#result { text-align:center; margin-top:8px; font-weight:800; min-height:28px; }
.badge { text-align:center; margin-top:4px; font-weight:900; color:#ff9600; }

/* RESULT AREA */
.result-box{ width:100%; height:100%; overflow-y:auto; padding:20px; }
.review-table{ width:100%; border-collapse:collapse; font-size:.8rem; border-radius:10px; overflow:hidden; margin-top:10px;}
.review-table th{ background:#58cc02; color:white; padding:8px; }
.review-table td{ padding:8px; border-bottom:1px solid #eee; }
.correct{ color:#2e7d32; font-weight:700; }
.wrong{ color:#c62828; font-weight:700; }

.restart { width:100%; padding:14px; border:none; border-radius:16px; font-weight:800; background:#ff9600; color:white; cursor:pointer; margin-top: 10px;}

.hidden { display: none !important; }
</style>
</head>

<body>

<div class="app">

    <div id="screen-menu">
        <h2>Latihan Saya</h2>
        <button class="btn-create" onclick="openBuilder()">+ Buat Latihan Baru</button>
        <div id="setList"></div>
    </div>

    <div id="screen-builder" class="hidden">
        <h2 id="builderTitle">Buat Latihan</h2>
        <div class="builder-form">
            <input id="setName" placeholder="Nama Set (Contoh: Kata Kerja)">
            <hr>
            <input id="jpInput" placeholder="Bahasa Jepang">
            <input id="indoInput" placeholder="Arti Indonesia">
            <button class="btn-start" onclick="addVocab()">+ Tambah Kata</button>
        </div>
        <div class="vocab-preview" id="vocabList"></div>
        <button class="btn-create" onclick="saveSet()">💾 Simpan Set</button>
        <button class="restart" style="background:#666" onclick="showScreen('menu')">Batal</button>
    </div>

    <div id="screen-quiz" class="hidden" style="height:100%; flex-direction:column; display:flex;">
        <div class="top-bar">
            <div class="level">XP</div>
            <div class="xp-bar"><div id="progressBar"></div></div>
            <div class="score" id="score">0 XP</div>
            <div class="streak" id="streak">x 0</div>
        </div>

        <table class="info-table">
            <tr>
                <td class="quiz-name" id="displayQuizName">---</td>
                <td class="q-number" id="qNumber">0 / 0</td>
            </tr>
        </table>

        <div class="card">
            <div id="question">?</div>
        </div>

        <div id="options"></div>
        <div id="result"></div>
        <div class="badge" id="badge"></div>
        
        <button class="restart" id="restartBtn" style="display:none" onclick="showScreen('menu')">Kembali ke Menu</button>
    </div>

</div>

<script>
let sets = JSON.parse(localStorage.getItem("ultra_vocab_sets")) || [];
let currentVocab = [];
let editingIndex = null;

// Quiz State
let q=[], cur=0, xp=0, streak=0, correct=0, wrong=0, perfectCorrect=0;
let wrongList=[], firstWrong=null;

/* ===== NAVIGATION ===== */
function showScreen(id) {
    document.getElementById('screen-menu').classList.add('hidden');
    document.getElementById('screen-builder').classList.add('hidden');
    document.getElementById('screen-quiz').classList.add('hidden');
    document.getElementById('screen-' + id).classList.remove('hidden');
    if(id === 'menu') renderSets();
}

/* ===== MENU LOGIC ===== */
function renderSets() {
    const list = document.getElementById('setList');
    list.innerHTML = "";
    sets.forEach((s, i) => {
        list.innerHTML += `
            <div class="set-item">
                <span class="set-info">${s.name} (${s.vocab.length} Kata)</span>
                <div class="set-actions">
                    <button class="btn-start" onclick="startQuiz(${i})">MULAI</button>
                    <button class="btn-edit" onclick="editSet(${i})">EDIT</button>
                    <button class="btn-delete" onclick="deleteSet(${i})">HAPUS</button>
                </div>
            </div>
        `;
    });
}

function deleteSet(i) {
    if(confirm("Hapus latihan ini?")) {
        sets.splice(i, 1);
        localStorage.setItem("ultra_vocab_sets", JSON.stringify(sets));
        renderSets();
    }
}

/* ===== BUILDER LOGIC ===== */
function openBuilder() {
    editingIndex = null;
    currentVocab = [];
    document.getElementById('setName').value = "";
    document.getElementById('builderTitle').innerText = "Buat Latihan";
    renderVocabPreview();
    showScreen('builder');
}

function editSet(i) {
    editingIndex = i;
    currentVocab = [...sets[i].vocab];
    document.getElementById('setName').value = sets[i].name;
    document.getElementById('builderTitle').innerText = "Edit Latihan";
    renderVocabPreview();
    showScreen('builder');
}

function addVocab() {
    const jp = document.getElementById('jpInput');
    const id = document.getElementById('indoInput');
    if(!jp.value || !id.value) return;
    currentVocab.push([jp.value, id.value]);
    jp.value = ""; id.value = "";
    renderVocabPreview();
}

function renderVocabPreview() {
    const list = document.getElementById('vocabList');
    list.innerHTML = currentVocab.map((v, i) => `
        <div class="v-item">
            <span>${v[0]} → ${v[1]}</span>
            <span style="color:red; cursor:pointer" onclick="currentVocab.splice(${i},1); renderVocabPreview();">✖</span>
        </div>
    `).join('');
}

function saveSet() {
    const name = document.getElementById('setName').value;
    if(!name || currentVocab.length < 2) return alert("Nama set harus diisi & minimal 2 kata!");
    
    const data = { name: name, vocab: currentVocab };
    if(editingIndex !== null) sets[editingIndex] = data;
    else sets.push(data);
    
    localStorage.setItem("ultra_vocab_sets", JSON.stringify(sets));
    showScreen('menu');
}

/* ===== QUIZ LOGIC ===== */
function shuffle(a){
    for(let i=a.length-1;i>0;i--){
        const j=Math.floor(Math.random()*(i+1));
        [a[i],a[j]]=[a[j],a[i]];
    }
}

function startQuiz(i) {
    const targetSet = sets[i];
    document.getElementById('displayQuizName').innerText = targetSet.name;
    q = [...targetSet.vocab];
    shuffle(q);
    
    // Reset State
    cur=0; xp=0; streak=0; correct=0; wrong=0; perfectCorrect=0;
    wrongList=[];
    document.getElementById('restartBtn').style.display = "none";
    document.querySelector(".card").innerHTML = '<div id="question">?</div>';
    
    showScreen('quiz');
    loadQuestion();
    updateUI();
}

function updateUI() {
    document.getElementById("score").textContent = xp + " XP";
    document.getElementById("streak").textContent = "x " + streak;
    const progress = (perfectCorrect / q.length) * 100;
    document.getElementById("progressBar").style.width = progress + "%";
    document.getElementById("qNumber").textContent = (cur + 1) + " / " + q.length;
}

function loadQuestion() {
    if(cur >= q.length) { finish(); return; }
    firstWrong = null;
    const [ques, ans] = q[cur];

    document.getElementById("question").textContent = ques;
    document.getElementById("result").textContent = "";
    document.getElementById("badge").textContent = "";

    const ops = new Set([ans]);
    // Ambil pengecoh dari seluruh set yang ada agar lebih sulit
    let allWords = [];
    sets.forEach(s => s.vocab.forEach(v => allWords.push(v[1])));
    
    while(ops.size < 4 && ops.size < allWords.length) {
        ops.add(allWords[Math.floor(Math.random() * allWords.length)]);
    }

    const optionsDiv = document.getElementById("options");
    optionsDiv.innerHTML = "";
    [...ops].sort(() => Math.random() - 0.5).forEach(o => {
        const b = document.createElement("button");
        b.textContent = o;
        b.onclick = () => check(o, ans, ques);
        optionsDiv.appendChild(b);
    });
    updateUI();
}

function check(sel, ans, ques) {
    if(sel === ans) {
        streak++; correct++;
        let bonus = streak >= 5 ? 5 : 2;
        xp += bonus;
        if(streak == 5) document.getElementById("badge").textContent = "🏆 COMBO x5";
        document.getElementById("result").textContent = "BENAR +"+bonus+"XP";
        if(!firstWrong) perfectCorrect++;
        else wrongList.push({ q: ques, your: firstWrong, correct: ans });
        cur++;
        updateUI();
        setTimeout(loadQuestion, 600);
    } else {
        streak = 0;
        if(!firstWrong) { firstWrong = sel; wrong++; }
        document.getElementById("result").textContent = "SALAH";
    }
}

function finish() {
    document.getElementById("options").innerHTML = "";
    document.getElementById("result").textContent = "";
    document.getElementById("badge").textContent = "";

    let html = `<div class="result-box"><div class="result-header" style="text-align:center"><h2>Selesai! 🎉</h2><p>Total XP: ${xp}</p></div>`;
    if(wrongList.length > 0) {
        html += `<table class="review-table"><tr><th>Soal</th><th>Kamu</th><th>Benar</th></tr>`;
        wrongList.forEach(i => {
            html += `<tr><td>${i.q}</td><td class="wrong">${i.your}</td><td class="correct">${i.correct}</td></tr>`;
        });
        html += `</table>`;
    } else {
        html += `<p style="text-align:center; font-weight:700; color:#58cc02; margin-top:20px;">Sempurna! Kamu Hebat! 🔥</p>`;
    }
    html += `</div>`;
    
    document.querySelector(".card").innerHTML = html;
    document.getElementById("progressBar").style.width = "100%";
    document.getElementById("restartBtn").style.display = "block";
}

// Initial Render
renderSets();
</script>

</body>
</html>
