<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Japanese Vocab Game ULTRA</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

html,body{
height:100%;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,sans-serif;
background:#e6f9e6;
}

body{
display:flex;
justify-content:center;
align-items:center;
}

.app{
width:100%;
max-width:420px;
height:100%;
background:#ffffff;
display:flex;
flex-direction:column;
padding:14px;
}

/* TOP BAR */

.top-bar{
display:flex;
align-items:center;
gap:10px;
}

.level{
background:#58cc02;
color:white;
padding:6px 12px;
border-radius:14px;
font-weight:800;
}

.xp-bar{
flex:1;
height:12px;
background:#dff5d8;
border-radius:20px;
overflow:hidden;
}

#progressBar{
height:100%;
width:0%;
background:linear-gradient(90deg,#58cc02,#89e219);
transition:.4s;
}

.score,.streak{
padding:6px 10px;
border-radius:14px;
background:#f1fdf0;
border:2px solid #58cc02;
font-weight:700;
}

/* INFO TABLE */

.info-table{
width:100%;
margin-top:6px;
border-collapse:collapse;
background:#f1fdf0;
border:2px solid #58cc02;
border-radius:12px;
overflow:hidden;
font-weight:800;
font-size:0.9rem;
}

.info-table td{
padding:6px 10px;
}

.quiz-name{
color:#58cc02;
text-align:left;
}

.q-number{
text-align:right;
color:#333;
}

/* CARD */

.card{
flex:1;
background:#f8fff6;
border-radius:26px;
margin:20px 0;
display:flex;
flex-direction: column; /* Ditambah agar soal & keterangan vertikal */
align-items:center;
justify-content:center;
box-shadow:0 10px 25px rgba(0,0,0,.08);
overflow:hidden;
}

#question{
font-size:2.6rem;
font-weight:900;
color:#000;
text-align:center;
}

/* Label Golongan Baru */
#groupLabel {
font-size: 1.1rem;
font-weight: 700;
color: #58cc02;
background: #eefceb;
padding: 4px 12px;
border-radius: 10px;
margin-top: 10px;
}

/* RESULT AREA */

.result-box{
width:100%;
height:100%;
overflow-y:auto;
padding:20px;
}

.result-header{
text-align:center;
margin-bottom:16px;
}

.result-header h2{
font-size:1.6rem;
font-weight:900;
color:#58cc02;
margin-bottom:66px;
}

.result-header p{
font-size:.9rem;
color:#666;
}

.review-table{
width:100%;
border-collapse:collapse;
font-size:.9rem;
border-radius:10px;
overflow:hidden;
}

.review-table th{
background:#58cc02;
color:white;
padding:8px;
text-align:left;
}

.review-table td{
padding:8px;
border-bottom:1px solid #eee;
}

.review-table tr:nth-child(even){
background:#f9fff7;
}

.correct{
color:#2e7d32;
font-weight:700;
}

.wrong{
color:#c62828;
font-weight:700;
}

/* OPTIONS */

#options{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

#options button{
padding:16px;
font-size:1.3rem;
border:none;
border-radius:18px;
background:#58cc02;
color:white;
font-weight:800;
cursor:pointer;
transition:.15s;
}

#options button:hover{
transform:scale(1.05);
background:#46b400;
}

/* RESULT TEXT */

#result{
text-align:center;
margin-top:8px;
font-weight:800;
min-height:28px;
}

.badge{
text-align:center;
margin-top:4px;
font-weight:900;
color:#ff9600;
}

/* BUTTON */

.restart{
padding:14px;
border:none;
border-radius:16px;
font-weight:800;
font-size:1rem;
cursor:pointer;
background:#ff9600;
color:white;
}

</style>
</head>

<body>

<div class="app">

<div class="top-bar">
<div class="level">XP</div>
<div class="xp-bar"><div id="progressBar"></div></div>
<div class="score" id="score">0 XP</div>
<div class="streak" id="streak">x 0</div>
</div>

<table class="info-table">
<tr>
<td class="quiz-name">Kata Kerja</td>
<td class="q-number" id="qNumber">1 / 10</td>
</tr>
</table>

<div class="card" id="cardContent">
<div id="question">?</div>
<div id="groupLabel">Golongan ?</div>
</div>

<div id="options"></div>

<div id="result"></div>
<div class="badge" id="badge"></div>

<button class="restart" id="restartBtn" onclick="start()" style="display:none;">
Mulai Ulang
</button>

</div>

    ["ならいます", "belajar", "Golongan 1"],
    ["なります", "menjadi", "Golongan 1"],

    // GOLONGAN 2
    ["あけます", "membuka", "Golongan 2"],

    ["しゅっちょうします", "dinas keluar kota", "Golongan 3"],

    ["でんわします", "menelepon", "Golongan 3"],
    ["ひっこしします", "pindah rumah", "Golongan 3"],
    ["べんきょうします", "belajar", "Golongan 3"],
    ["もってきます", "membawa, datang membawa", "Golongan 3"],
    ["よやくします", "memesan", "Golongan 3"],
    ["りゅうがくします", "belajar di luar negeri", "Golongan 3"],
    ["れんしゅうします", "berlatih", "Golongan 3"]
];

let q=[],cur=0,xp=0,streak=0;
let correct=0;
let wrong=0;
let wrongList=[];
let firstWrong=null;
let perfectCorrect=0;

function shuffle(a){
for(let i=a.length-1;i>0;i--){
const j=Math.floor(Math.random()*(i+1));
[a[i],a[j]]=[a[j],a[i]];
}
}

function updateUI(){
document.getElementById("score").textContent=xp+" XP";
document.getElementById("streak").textContent="x "+streak;
const progress=(perfectCorrect/q.length)*100;
document.getElementById("progressBar").style.width=progress+"%";
document.getElementById("qNumber").textContent=(cur+1)+" / "+q.length;
}

function loadQuestion(){
if(cur>=q.length){
finish();
return;
}

firstWrong=null;

const [jp, indo, group] = q[cur];

document.getElementById("question").textContent=jp;
document.getElementById("groupLabel").textContent=group; // Update keterangan golongan
document.getElementById("result").textContent="";
document.getElementById("badge").textContent="";

const ops=new Set([indo]);

while(ops.size<4){
ops.add(vocab[Math.floor(Math.random()*vocab.length)][1]);
}

document.getElementById("options").innerHTML="";

[...ops].sort(()=>Math.random()-0.5).forEach(o=>{
const b=document.createElement("button");
b.textContent=o;
b.onclick=()=>check(o,indo,jp);
document.getElementById("options").appendChild(b);
});

updateUI();
}

function check(sel,ans,jp){
if(sel===ans){
streak++;
correct++;
let bonus=streak>=5?5:2;
xp+=bonus;

if(streak==5){
document.getElementById("badge").textContent="🏆 COMBO x5";
}

document.getElementById("result").textContent="BENAR +"+bonus+"XP";
if(!firstWrong){
perfectCorrect++;
}
if(firstWrong){
wrongList.push({
q:jp,
your:firstWrong,
correct:ans
});
}
cur++;
updateUI();
setTimeout(loadQuestion,500);
}else{
streak=0;
if(!firstWrong){
firstWrong=sel;
wrong++;
}
document.getElementById("result").textContent="SALAH";
}
}

function finish(){
document.getElementById("options").innerHTML="";
document.getElementById("result").textContent="";
document.getElementById("badge").textContent="";

let html=`
<div class="result-box">
<div class="result-header">
<h2>Quiz Selesai 🎉</h2>
<p>Lihat progres belajarmu</p>
</div>
`;

if(wrongList.length>0){
html+=`
<table class="review-table">
<tr>
<th>Soal</th>
<th>Jawaban Kamu</th>
<th>Jawaban Benar</th>
</tr>
`;
wrongList.forEach(i=>{
html+=`
<tr>
<td>${i.q}</td>
<td class="wrong">${i.your}</td>
<td class="correct">${i.correct}</td>
</tr>
`;
});
html+=`</table>`;
}else{
html+=`<p style="text-align:center;font-weight:700;color:#2e7d32;">Semua jawaban benar! 🔥</p>`;
}

html+=`</div>`;
document.getElementById("cardContent").innerHTML=html;
document.getElementById("progressBar").style.width="100%";
document.getElementById("restartBtn").style.display="block";
}

function start(){
q=[...vocab];
shuffle(q);
cur=0;
xp=0;
streak=0;
correct=0;
wrong=0;
perfectCorrect=0;
wrongList=[];

// Reset tampilan Card agar ada elemen question dan groupLabel lagi
document.getElementById("cardContent").innerHTML='<div id="question">?</div><div id="groupLabel">Golongan ?</div>';

document.getElementById("restartBtn").style.display="none";
loadQuestion();
}

start();

</script>

</body>
</html>
