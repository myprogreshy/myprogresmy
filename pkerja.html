<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kuis Perubahan Kata Kerja</title>

<style>
/* CSS tetap konsisten dengan gaya ULTRA kamu */
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,sans-serif;background:#eef2ff;}
body{display:flex;justify-content:center;align-items:center;}
.app{width:100%;max-width:420px;height:100%;background:#ffffff;display:flex;flex-direction:column;padding:14px;}
.top-bar{display:flex;align-items:center;gap:10px;}
.level{background:#2c7be5;color:white;padding:6px 12px;border-radius:14px;font-weight:800;}
.xp-bar{flex:1;height:12px;background:#e5edff;border-radius:20px;overflow:hidden;}
#progressBar{height:100%;width:0%;background:linear-gradient(90deg,#2c7be5,#4dabf7);transition:.4s;}
.score,.streak{padding:6px 10px;border-radius:14px;background:#f0f4ff;border:2px solid #2c7be5;font-weight:700;}
.info-table{width:100%;margin-top:6px;border-collapse:collapse;background:#f0f4ff;border:2px solid #2c7be5;border-radius:12px;overflow:hidden;font-weight:800;font-size:0.9rem;}
.info-table td{padding:6px 10px;}
.quiz-name{color:#2c7be5;text-align:left;}
.q-number{text-align:right;color:#333;}
.card{flex:1;background:#f8faff;border-radius:26px;margin:20px 0;display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:0 10px 25px rgba(0,0,0,.08);overflow:hidden;padding:20px;}

#question{font-size:2.6rem;font-weight:900;color:#000;text-align:center;}
#instruction{font-size:1.1rem;color:#2c7be5;font-weight:700;margin-top:10px;background:#e7f0ff;padding:5px 15px;border-radius:10px;}

.result-box{width:100%;height:100%;overflow-y:auto;padding:20px;}
.result-header{text-align:center;margin-bottom:16px;}
.result-header h2{font-size:1.6rem;font-weight:900;color:#2c7be5;margin-bottom:6px;}
.review-table{width:100%;border-collapse:collapse;font-size:.9rem;border-radius:10px;overflow:hidden;}
.review-table th{background:#2c7be5;color:white;padding:8px;text-align:left;}
.review-table td{padding:8px;border-bottom:1px solid #eee;}
.correct{color:#1a56db;font-weight:700;}
.wrong{color:#c81e1e;font-weight:700;}
#options{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
#options button{padding:16px;font-size:1rem;border:none;border-radius:18px;background:#2c7be5;color:white;font-weight:800;cursor:pointer;transition:.15s;}
#options button:hover{transform:scale(1.05);background:#1a56db;}
#result{text-align:center;margin-top:8px;font-weight:800;min-height:28px;}
.badge{text-align:center;margin-top:4px;font-weight:900;color:#ff9600;}
.restart{padding:14px;border:none;border-radius:16px;font-weight:800;font-size:1rem;cursor:pointer;background:#ff9600;color:white;}
</style>
</head>

<body>

<div class="app">
    <div class="top-bar">
        <div class="level">XP</div>
        <div class="xp-bar"><div id="progressBar"></div></div>
        <div class="score" id="score">0 XP</div>
        <div class="streak" id="streak">x 0</div>
    </div>

    <table class="info-table">
        <tr>
            <td class="quiz-name">Kata Kerja (動詞)</td>
            <td class="q-number" id="qNumber">1 / 10</td>
        </tr>
    </table>

    <div class="card">
        <div id="question">?</div>
        <div id="instruction">Bentuk...</div>
    </div>

    <div id="options"></div>
    <div id="result"></div>
    <div class="badge" id="badge"></div>
    <button class="restart" id="restartBtn" onclick="start()" style="display:none;">Mulai Ulang</button>
</div>

<script>
// Data soal: [Kata Dasar, Instruksi, Jawaban Benar]
const vocab = [
    ["いく", "Sopan ", "いきます"],
    ["いく", "Negatif ", "いきません"],
    ["いく", "Lampau ", "いきました"],
    ["いく", "L. Negatif ", "いきませんでした"],
    ["たべる", "Sopan ", "たべます"],
    ["たべる", "Negatif ", "たべません"],
    ["たべる", "Lampau ", "たべました"],
    ["のむ", "Sopan ", "のみます"],
    ["のむ", "Negatif ", "のみません"],
    ["くる", "Sopan ", "きます"],
    ["くる", "Lampau ", "きました"],
    ["する", "Sopan ", "します"]
];

// Jawaban salah acak untuk variasi opsi
const allDistractors = [
    "いきませ", "いくます", "たべた", "のみました", 
    "しります", "きません", "いきますでした", "たべませんでした", 
    "のみなさい", "しりません", "いきなさい", "きますでした"
];

let q=[],cur=0,xp=0,streak=0;
let correct=0, wrong=0, perfectCorrect=0;
let wrongList=[];
let firstWrong=null;

function shuffle(a){
    for(let i=a.length-1;i>0;i--){
        const j=Math.floor(Math.random()*(i+1));
        [a[i],a[j]]=[a[j],a[i]];
    }
}

function updateUI(){
    document.getElementById("score").textContent=xp+" XP";
    document.getElementById("streak").textContent="x "+streak;
    const progress=(perfectCorrect/q.length)*100;
    document.getElementById("progressBar").style.width=progress+"%";
    document.getElementById("qNumber").textContent=(cur+1)+" / "+q.length;
}

function loadQuestion(){
    if(cur>=q.length){
        finish();
        return;
    }
    firstWrong=null;
    const [word, type, ans] = q[cur];

    document.getElementById("question").textContent = word;
    document.getElementById("instruction").textContent = "Bentuk " + type;
    document.getElementById("result").textContent = "";
    document.getElementById("badge").textContent = "";

    const ops = new Set([ans]);
    while(ops.size < 4){
        let rand = allDistractors[Math.floor(Math.random()*allDistractors.length)];
        if(rand !== ans) ops.add(rand);
    }

    document.getElementById("options").innerHTML="";
    [...ops].sort(()=>Math.random()-0.5).forEach(o=>{
        const b=document.createElement("button");
        b.textContent=o;
        b.onclick=()=>check(o, ans, word + " (" + type + ")");
        document.getElementById("options").appendChild(b);
    });
    updateUI();
}

function check(sel, ans, fullQ){
    if(sel===ans){
        streak++;
        correct++;
        let bonus=streak>=5?5:2;
        xp+=bonus;
        if(streak==5) document.getElementById("badge").textContent="🏆 COMBO x5";
        document.getElementById("result").textContent="BENAR +"+bonus+"XP";
        if(!firstWrong) perfectCorrect++;
        if(firstWrong){
            wrongList.push({ q:fullQ, your:firstWrong, correct:ans });
        }
        cur++;
        updateUI();
        setTimeout(loadQuestion, 500);
    }else{
        streak=0;
        if(!firstWrong){ firstWrong=sel; wrong++; }
        document.getElementById("result").textContent="SALAH";
    }
}

function finish(){
    document.getElementById("options").innerHTML="";
    document.getElementById("result").textContent="";
    document.getElementById("badge").textContent="";
    let html=`<div class="result-box"><div class="result-header"><h2>Latihan Selesai! 🎉</h2><p>Nilai akhir kamu</p></div>`;
    if(wrongList.length>0){
        html+=`<table class="review-table"><tr><th>Soal</th><th>Kamu</th><th>Benar</th></tr>`;
        wrongList.forEach(i=>{
            html+=`<tr><td>${i.q}</td><td class="wrong">${i.your}</td><td class="correct">${i.correct}</td></tr>`;
        });
        html+=`</table>`;
    }else{
        html+=`<p style="text-align:center;font-weight:700;color:#1a56db;">Sugoi! Semua jawaban benar. 🌟</p>`;
    }
    html+=`</div>`;
    document.querySelector(".card").innerHTML=html;
    document.getElementById("progressBar").style.width="100%";
    document.getElementById("restartBtn").style.display="block";
}

function start(){
    q=[...vocab];
    shuffle(q);
    cur=0; xp=0; streak=0; correct=0; wrong=0; perfectCorrect=0;
    wrongList=[];
    document.querySelector(".card").innerHTML='<div id="question">?</div><div id="instruction"></div>';
    document.getElementById("restartBtn").style.display="none";
    loadQuestion();
}

start();
</script>

</body>
</html>
