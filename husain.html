<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel Quiz Jepang</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
body{font-family:'Inter',sans-serif;margin:0;padding:0;background:#f6f8fb;color:#1f2937}
.container{max-width:1200px;margin:auto;padding:20px}
h1{font-size:22px;font-weight:600;margin-bottom:15px}
h2{font-size:18px;font-weight:600;margin-top:25px;margin-bottom:10px}
table{width:100%;border-collapse:collapse;background:#fff;border:1px solid #e5e7eb;border-radius:8px;overflow:hidden}
th,td{padding:10px;text-align:left;border-bottom:1px solid #e5e7eb;font-size:13px;word-break:break-word}
th{background:#f3f4f6;color:#1f2937;position:sticky;top:0}
tr:hover{background:#f0f6ff}
.count-box{margin-bottom:20px;padding:15px;background:#fff;border:1px solid #e5e7eb;border-radius:8px;font-size:16px;font-weight:600}
.table-container{overflow-x:auto;max-height:600px;overflow-y:auto;border:1px solid #e5e7eb;border-radius:8px;background:#fff;padding:5px}
</style>
</head>
<body>
<div class="container">
<h1>Admin Panel - Quiz Jepang</h1>
<div class="count-box" id="onlineCount">Pengunjung Online Sekarang: ...</div>

<h2>Data Pengunjung</h2>
<div class="table-container">
<table id="visitorTable">
  <thead>
    <tr>
      <th>ID</th>
      <th>Waktu</th>
      <th>User Agent</th>
      <th>Halaman</th>
      <th>IP</th>
      <th>Browser</th>
      <th>OS</th>
      <th>Device Type</th>
      <th>Kontinen</th>
      <th>Region</th>
      <th>Latitude</th>
      <th>Longitude</th>
      <th>Timezone</th>
      <th>ISP</th>
      <th>Negara</th>
      <th>Kota</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script>
const SUPABASE_URL = "https://mdjydhodzarckjveyiwz.supabase.co";
const SUPABASE_KEY = "sb_publishable_AnEKgrM-INkddvbOXP1Utw_fHhv-BO3";
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function loadVisitors(){
  try{
    const { data, error } = await supabase
      .from("visitors")
      .select("*")
      .order('time', {ascending:false})
      .limit(100);
    if(error) throw error;

    const tbody = document.querySelector("#visitorTable tbody");
    tbody.innerHTML = data.map(v=>`
      <tr>
        <td>${v.id}</td>
        <td>${new Date(v.time).toLocaleString()}</td>
        <td>${v.user_agent || '-'}</td>
        <td>${v.page || '-'}</td>
        <td>${v.ip || '-'}</td>
        <td>${v.browser || '-'}</td>
        <td>${v.os || '-'}</td>
        <td>${v.device_type || '-'}</td>
        <td>${v.continent || '-'}</td>
        <td>${v.region || '-'}</td>
        <td>${v.latitude || '-'}</td>
        <td>${v.longitude || '-'}</td>
        <td>${v.timezone || '-'}</td>
        <td>${v.isp || '-'}</td>
        <td>${v.country || '-'}</td>
        <td>${v.city || '-'}</td>
      </tr>
    `).join('');

    // Hitung online (aktif dalam 5 menit terakhir)
    const now = new Date();
    const onlineCount = data.filter(v=>{
      return new Date(v.time) > new Date(now - 5*60*1000);
    }).length;
    document.getElementById("onlineCount").innerText = `Pengunjung Online Sekarang: ${onlineCount}`;
  } catch(e){ console.log("Error loading visitors:", e); }
}

// Load awal
loadVisitors();

// Refresh otomatis tiap 10 detik
setInterval(loadVisitors,10000);
</script>
</body>
</html>
