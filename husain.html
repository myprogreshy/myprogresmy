<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monitor Pengunjung</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body { font-family:sans-serif; background:#f6f8fb; padding:20px; }
h1 { color:#2c7be5; }
table { border-collapse: collapse; width: 100%; background:#fff; }
th, td { border: 1px solid #ddd; padding: 8px; text-align:left; }
th { background:#2c7be5; color:white; }
</style>
</head>
<body>

<h1>Monitor Pengunjung</h1>

<table>
  <thead>
    <tr>
      <th>ID</th>
      <th>Waktu</th>
      <th>Device</th>
      <th>Halaman</th>
    </tr>
  </thead>
  <tbody id="data"></tbody>
</table>

<script>
window.addEventListener("load", async () => {

  const supabase = window.supabase.createClient(
    "https://mdjydhodzarckjveyiwz.supabase.co",
    "sb_publishable_AnEKgrM-INkddvbOXP1Utw_fHhv-BO3"
  );

  async function loadData(){
    const { data, error } = await supabase
      .from("visitors")
      .select("*")
      .order("time", { ascending: false });

    if(error){
      alert("ERROR: " + error.message);
      return;
    }

    const tbody = document.getElementById("data");
    tbody.innerHTML = "";

    data.forEach(v => {
      const row = `
        <tr>
          <td>${v.id}</td>
          <td>${new Date(v.time).toLocaleString()}</td>
          <td>${v.user_agent}</td>
          <td>${v.page}</td>
        </tr>
      `;
      tbody.innerHTML += row;
    });
  }

  loadData();

  // auto refresh tiap 5 detik
  setInterval(loadData, 5000);

});
</script>

</body>
</html>
