<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Test - Quiz Jepang</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
body{font-family:'Inter',sans-serif;background:#f6f8fb;margin:0;padding:20px;color:#1f2937}
.container{max-width:800px;margin:auto;padding:20px;background:#fff;border-radius:10px;box-shadow:0 2px 10px rgba(0,0,0,.1)}
h1{font-size:22px;margin-bottom:15px}
table{width:100%;border-collapse:collapse;margin-top:10px}
th,td{padding:10px;border:1px solid #e5e7eb;text-align:left;font-size:14px}
th{background:#f3f4f6}
tr:hover{background:#f0f6ff}
</style>
</head>
<body>

<div class="container">
<h1>Admin Test - Pengunjung</h1>
<table>
  <thead>
    <tr>
      <th>Waktu</th>
      <th>Halaman</th>
    </tr>
  </thead>
  <tbody id="visitor-table">
    <tr><td colspan="2">Memuat data...</td></tr>
  </tbody>
</table>
</div>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script>
const SUPABASE_URL = "https://mdjydhodzarckjveyiwz.supabase.co";
const SUPABASE_KEY = "sb_publishable_AnEKgrM-INkddvbOXP1Utw_fHhv-BO3";
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function loadVisitors() {
  try {
    const { data, error } = await supabase
      .from('visitors')
      .select('time,page')
      .order('time', { ascending: false })
      .limit(10);

    if(error) throw error;

    const tbody = document.getElementById('visitor-table');
    if(data.length === 0){
      tbody.innerHTML = `<tr><td colspan="2">Belum ada data</td></tr>`;
      return;
    }

    tbody.innerHTML = data.map(v => `
      <tr>
        <td>${new Date(v.time).toLocaleString()}</td>
        <td>${v.page || '-'}</td>
      </tr>
    `).join('');

    console.log("Data pengunjung:", data);
  } catch(e){
    console.log("Error loadVisitors:", e);
    document.getElementById('visitor-table').innerHTML = `<tr><td colspan="2">Error: ${e.message}</td></tr>`;
  }
}

// Jalankan otomatis
loadVisitors();
</script>

</body>
</html>
