<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
body{font-family:'Inter',sans-serif;background:#f6f8fb;color:#1f2937;margin:0;padding:0}
.container{max-width:1100px;margin:auto;padding:20px}
h1{font-size:24px;margin-bottom:10px}
h2{font-size:18px;margin-top:20px}
table{width:100%;border-collapse:collapse;margin-top:10px}
th,td{padding:8px;border:1px solid #e5e7eb;text-align:left}
th{background:#e5e7eb}
</style>
</head>
<body>
<div class="container">
<h1>Admin Dashboard</h1>
<h2>Jumlah Pengunjung Online Sekarang: <span id="online-count">0</span></h2>
<h2>Daftar Pengunjung Terbaru</h2>
<table>
  <thead>
    <tr>
      <th>Time</th><th>IP</th><th>Country</th><th>City</th><th>Device</th><th>Browser</th>
    </tr>
  </thead>
  <tbody id="visitor-table"></tbody>
</table>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const supabase = window.supabase.createClient(
  "https://mdjydhodzarckjveyiwz.supabase.co",
  "sb_publishable_AnEKgrM-INkddvbOXP1Utw_fHhv-BO3"
);

async function loadVisitors(){
  const { data, error } = await supabase.from("visitors")
    .select("*")
    .order("time",{ascending:false})
    .limit(50);

  if(error){ console.log(error); return; }

  const table = document.getElementById("visitor-table");
  table.innerHTML = "";
  data.forEach(v=>{
    table.innerHTML += `<tr>
      <td>${new Date(v.time).toLocaleString()}</td>
      <td>${v.ip}</td>
      <td>${v.country}</td>
      <td>${v.city}</td>
      <td>${v.device_type}</td>
      <td>${v.user_agent}</td>
    </tr>`;
  });

  // hitung pengunjung online (last 5 menit)
  const now = new Date();
  const online = data.filter(d => new Date(d.time) > new Date(now - 5*60*1000)).length;
  document.getElementById("online-count").innerText = online;
}

// load awal
loadVisitors();

// refresh setiap 30 detik
setInterval(loadVisitors, 30000);
</script>
</body>
</html>
