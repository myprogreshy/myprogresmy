<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Admin</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{font-family:sans-serif;background:#f6f8fb;padding:20px}
.card{background:#fff;padding:15px;margin-bottom:10px;border-radius:8px}
table{width:100%;background:#fff;border-collapse:collapse}
th,td{padding:10px;border-bottom:1px solid #eee}
th{background:#2c7be5;color:#fff}
</style>
</head>

<body>

<h2>Dashboard</h2>

<div class="card">🟢 Online: <b id="online">0</b></div>
<div class="card">👥 Hari ini: <b id="today">0</b></div>
<div class="card">📄 Total: <b id="total">0</b></div>

<table>
<thead>
<tr>
<th>Waktu</th>
<th>Device</th>
<th>Halaman</th>
</tr>
</thead>
<tbody id="data"></tbody>
</table>

<script>
const supabase = window.supabase.createClient(
  "https://mdjydhodzarckjveyiwz.supabase.co",
  "sb_publishable_AnEKgrM-INkddvbOXP1Utw_fHhv-BO3"
);

async function loadData(){

  const { data, error } = await supabase
    .from("visitors")
    .select("*")
    .order("time", { ascending: false });

  if(error){
    alert("ERROR: " + error.message);
    return;
  }

  console.log("DATA:", data); // DEBUG

  let online = 0;
  let today = 0;
  const now = new Date();

  const tbody = document.getElementById("data");
  tbody.innerHTML = "";

  data.forEach(v=>{
    const t = new Date(v.time);

    // ONLINE (15 MENIT biar pasti kelihatan)
    if(now - t < 15 * 60 * 1000){
      online++;
    }

    // HARI INI
    if(t.toDateString() === now.toDateString()){
      today++;
    }

    tbody.innerHTML += `
      <tr>
        <td>${t.toLocaleString()}</td>
        <td>${v.user_agent}</td>
        <td>${v.page}</td>
      </tr>
    `;
  });

  document.getElementById("online").innerText = online;
  document.getElementById("today").innerText = today;
  document.getElementById("total").innerText = data.length;
}

loadData();
setInterval(loadData, 5000);
</script>

</body>
</html>
